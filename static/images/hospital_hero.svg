<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" fill="none">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="900" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF7FF"/>
      <stop offset="1" stop-color="#E9F9F6"/>
    </linearGradient>
    <linearGradient id="glass" x1="260" y1="100" x2="720" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#DDEBFF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1000" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="560" rx="28" fill="url(#bg)"/>

  <!-- soft blobs -->
  <circle cx="170" cy="150" r="90" fill="#C7E7FF" opacity="0.55"/>
  <circle cx="820" cy="120" r="70" fill="#C9F2EA" opacity="0.55"/>
  <circle cx="820" cy="420" r="110" fill="#E6DBFF" opacity="0.45"/>

  <!-- building -->
  <g filter="url(#shadow)">
    <rect x="270" y="120" width="420" height="320" rx="18" fill="url(#glass)" stroke="#BFD7FF" stroke-width="2"/>
    <rect x="320" y="170" width="90" height="70" rx="10" fill="#FFFFFF" stroke="#CFE3FF"/>
    <rect x="430" y="170" width="90" height="70" rx="10" fill="#FFFFFF" stroke="#CFE3FF"/>
    <rect x="540" y="170" width="90" height="70" rx="10" fill="#FFFFFF" stroke="#CFE3FF"/>

    <rect x="320" y="260" width="90" height="70" rx="10" fill="#FFFFFF" stroke="#CFE3FF"/>
    <rect x="430" y="260" width="90" height="70" rx="10" fill="#FFFFFF" stroke="#CFE3FF"/>
    <rect x="540" y="260" width="90" height="70" rx="10" fill="#FFFFFF" stroke="#CFE3FF"/>

    <rect x="440" y="350" width="80" height="90" rx="12" fill="#FFFFFF" stroke="#CFE3FF"/>
    <rect x="448" y="360" width="64" height="18" rx="9" fill="#E8F1FF"/>
    <rect x="448" y="386" width="64" height="18" rx="9" fill="#E8F1FF"/>

    <!-- cross -->
    <rect x="462" y="140" width="36" height="80" rx="10" fill="#2563EB"/>
    <rect x="440" y="162" width="80" height="36" rx="10" fill="#2563EB"/>
  </g>

  <!-- stethoscope-ish icon -->
  <path d="M145 345c0 65 55 95 110 95 63 0 105-39 105-93v-28" stroke="#0F766E" stroke-width="14" stroke-linecap="round"/>
  <path d="M160 220v58c0 26 21 47 47 47s47-21 47-47v-58" stroke="#0F766E" stroke-width="14" stroke-linecap="round"/>
  <circle cx="360" cy="319" r="24" fill="#FFFFFF" stroke="#0F766E" stroke-width="10"/>

  <!-- small heart -->
  <path d="M770 310c-10-16-35-18-48 0-13-18-38-16-48 0-12 19-2 41 15 56 9 8 22 16 33 23 11-7 24-15 33-23 17-15 27-37 15-56z" fill="#EF4444" opacity="0.9"/>
</svg>

